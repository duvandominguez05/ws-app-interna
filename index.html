<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>W&S Textil — App Interna</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="apple-touch-icon" href="/icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="W&S Textil">
  <meta name="theme-color" content="#f97316">
  <link rel="manifest" href="/manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

    /* HEADER */
    header {
      background: #1a1d27;
      border-bottom: 2px solid #f97316;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.2rem; color: #f97316; font-weight: 700; letter-spacing: 1px; }
    header span { font-size: 0.8rem; color: #888; }

    /* NAV */
    nav {
      background: #1a1d27;
      display: flex;
      gap: 4px;
      padding: 10px 24px;
      border-bottom: 1px solid #2a2d3a;
      flex-wrap: wrap;
    }
    nav button {
      background: transparent;
      border: 1px solid #2a2d3a;
      color: #aaa;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    nav button:hover, nav button.active {
      background: #f97316;
      border-color: #f97316;
      color: #fff;
      font-weight: 600;
    }

    /* MAIN */
    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    /* SECTION */
    .section { display: none; }
    .section.active { display: block; }

    /* CARDS RESUMEN */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 18px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #f97316; }
    .card .num { font-size: 2rem; font-weight: 700; color: #f97316; }
    .card .label { font-size: 0.78rem; color: #888; margin-top: 4px; }

    /* KANBAN */
    .kanban {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      align-items: start;
    }
    .kanban-col {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      overflow: hidden;
    }
    .kanban-col-header {
      padding: 12px 16px;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .kanban-col-header .cnt {
      background: #0f1117;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.75rem;
    }
    .kanban-cards { padding: 10px; min-height: 80px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-card {
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .kanban-card:hover { border-color: #f97316; transform: translateY(-1px); }
    .kanban-card .kc-num { font-size: 0.72rem; color: #555; margin-bottom: 4px; }
    .kanban-card .kc-cliente { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
    .kanban-card .kc-producto { font-size: 0.78rem; color: #aaa; margin-bottom: 8px; }
    .kanban-card .kc-vendedor { font-size: 0.72rem; color: #f97316; margin-bottom: 8px; }
    .kanban-card .kc-actions { display: flex; gap: 6px; flex-wrap: wrap; }

    /* COLORES COLUMNAS DISEÑO */
    .col-hacer-diseno .kanban-col-header    { background: #1e2a4a; color: #60a5fa; }
    .col-enviado-cliente .kanban-col-header { background: #2a1e4a; color: #a78bfa; }
    .col-para-consignar .kanban-col-header  { background: #3b2a1a; color: #fb923c; }
    .col-consignado .kanban-col-header      { background: #14532d; color: #4ade80; }

    /* COLORES COLUMNAS PRODUCCIÓN */
    .col-aprobado .kanban-col-header        { background: #14532d; color: #4ade80; }
    .col-enviado-calandra .kanban-col-header { background: #1e3a5f; color: #60a5fa; }
    .col-llego-impresion .kanban-col-header { background: #2a1e4a; color: #a78bfa; }
    .col-corte .kanban-col-header           { background: #3b1f1f; color: #f87171; }
    .col-calidad .kanban-col-header         { background: #3b2a1a; color: #fb923c; }
    .col-costura .kanban-col-header         { background: #1a3b2a; color: #34d399; }

    /* COLORES COLUMNAS VENTAS */
    .col-ventas .kanban-col-header          { background: #1e3a5f; color: #60a5fa; }
    .col-arreglos .kanban-col-header        { background: #3b1f1f; color: #f87171; }
    .col-listo .kanban-col-header           { background: #14532d; color: #4ade80; }
    .col-enviado-cliente2 .kanban-col-header { background: #1f2230; color: #888; }

    /* TABLA */
    .tabla-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th {
      background: #1a1d27;
      color: #f97316;
      padding: 12px 14px;
      text-align: left;
      border-bottom: 2px solid #f97316;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    td { padding: 11px 14px; border-bottom: 1px solid #1f2230; vertical-align: middle; }
    tr:hover td { background: #1f2230; }

    /* BADGE */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* FORMULARIO */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      color: #e0e0e0;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #f97316; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn {
      background: #f97316;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: #ea6c10; }
    .btn.secondary {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      color: #aaa;
    }
    .btn.secondary:hover { border-color: #f97316; color: #f97316; }
    .btn.danger { background: #3b1f1f; color: #f87171; border: 1px solid #5a2a2a; }
    .btn.danger:hover { background: #5a1f1f; }

    h2 { font-size: 1.1rem; color: #e0e0e0; margin-bottom: 20px; font-weight: 600; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }

    /* RENTABILIDAD */
    .rent-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1f2230; }
    .rent-row .rkey { color: #888; font-size: 0.9rem; }
    .rent-row .rval { font-weight: 600; }
    .rent-row .rval.pos { color: #4ade80; }
    .rent-row .rval.neg { color: #f87171; }
    .rent-row .rval.neu { color: #f97316; }

    /* SEARCH */
    .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-bar input {
      flex: 1;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      color: #e0e0e0;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }
    .search-bar input:focus { border-color: #f97316; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal h2 { margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #4ade80;
      color: #0f1117;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      display: none;
      z-index: 999;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* EMPTY */
    .empty { text-align: center; color: #555; padding: 30px; font-size: 0.9rem; }

    /* BANDEJA */
    .bandeja-card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .bandeja-card.tipo-cotizar { border-left: 4px solid #a78bfa; }
    .bandeja-card.tipo-pedido  { border-left: 4px solid #4ade80; }
    .bandeja-card .b-info { flex: 1; min-width: 160px; }
    .bandeja-card .b-num  { font-size: 0.72rem; color: #555; margin-bottom: 2px; }
    .bandeja-card .b-tel  { font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
    .bandeja-card .b-meta { font-size: 0.8rem; color: #aaa; }
    .bandeja-card .b-tipo { font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    .tipo-cotizar .b-tipo { background: #2a1e4a; color: #a78bfa; }
    .tipo-pedido  .b-tipo { background: #14532d; color: #4ade80; }

    @media (max-width: 600px) {
      main { padding: 12px; }
      .kanban { grid-template-columns: 1fr; }
      nav { padding: 8px 12px; }
      nav button { padding: 6px 10px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚡ W&S Textil</h1>
  <span id="fecha-header"></span>
</header>

<nav>
  <button class="active" onclick="showSection('bandeja', this)">📥 Bandeja</button>
  <button onclick="showSection('diseno', this)">🎨 Diseño</button>
  <button onclick="showSection('produccion', this)">🏭 Producción</button>
</nav>

<main>

  <!-- ===== BANDEJA DE ENTRADA ===== -->
  <section id="bandeja" class="section active">
    <div class="section-header">
      <h2>📥 Bandeja de entrada</h2>
      <button class="btn" onclick="abrirModal()">+ Nuevo pedido</button>
    </div>
    <div class="cards">
      <div class="card"><div class="num" id="b-cnt-total">0</div><div class="label">Sin completar</div></div>
      <div class="card"><div class="num" id="b-cnt-cotizar">0</div><div class="label">Cotizaciones</div></div>
      <div class="card"><div class="num" id="b-cnt-pedido">0</div><div class="label">Pedidos confirmados</div></div>
    </div>
    <div id="bandeja-lista" style="display:flex;flex-direction:column;gap:10px;"></div>
  </section>

  <!-- ===== DISEÑO ===== -->
  <section id="diseno" class="section">
    <div class="section-header">
      <h2>🎨 Diseño</h2>
    </div>

    <div class="cards">
      <div class="card"><div class="num" id="d-cnt-consignar">0</div><div class="label">Para consignar</div></div>
      <div class="card"><div class="num" id="d-cnt-hacer">0</div><div class="label">Hacer diseño</div></div>
      <div class="card"><div class="num" id="d-cnt-consignado">0</div><div class="label">Confirmado</div></div>
    </div>

    <div class="kanban" id="kanban-diseno"></div>
  </section>

  <!-- ===== PRODUCCIÓN ===== -->
  <section id="produccion" class="section">
    <div class="section-header">
      <h2>🏭 Producción</h2>
    </div>

    <div class="cards">
      <div class="card"><div class="num" id="p-cnt-aprobado">0</div><div class="label">Aprobados</div></div>
      <div class="card"><div class="num" id="p-cnt-calandra">0</div><div class="label">En calandra</div></div>
      <div class="card"><div class="num" id="p-cnt-impresion">0</div><div class="label">Llegó impresión</div></div>
      <div class="card"><div class="num" id="p-cnt-corte">0</div><div class="label">Corte</div></div>
      <div class="card"><div class="num" id="p-cnt-calidad">0</div><div class="label">Calidad</div></div>
      <div class="card"><div class="num" id="p-cnt-costura">0</div><div class="label">Costura</div></div>
      <div class="card"><div class="num" id="p-cnt-listo">0</div><div class="label">Listos</div></div>
      <div class="card"><div class="num" id="p-cnt-enviado">0</div><div class="label">Enviados</div></div>
    </div>

    <div class="kanban" id="kanban-produccion"></div>
  </section>

</main>

<!-- MODAL NUEVO PEDIDO -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-titulo">Nuevo pedido</h2>
    <div id="modal-campos-nuevos">
      <div class="form-grid">
        <div class="form-group">
          <label>Número WhatsApp cliente</label>
          <input type="text" id="m-telefono" placeholder="3XXXXXXXXX">
        </div>
        <div class="form-group">
          <label>Vendedora</label>
          <select id="m-vendedora">
            <option value="">Seleccionar</option>
            <option value="Betty">Betty</option>
            <option value="Ney">Ney</option>
            <option value="Graciela">Graciela</option>
            <option value="Wendy">Wendy</option>
            <option value="Paola">Paola</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="m-tipobandeja" onchange="onTipoChange()">
            <option value="cotizar">🎨 Cotización (necesita diseño)</option>
            <option value="pedido">✅ Pedido confirmado</option>
          </select>
        </div>
      </div>
    </div>
    <div id="modal-pedido-extra">
      <div class="form-grid" id="modal-fecha-row">
        <div class="form-group">
          <label>Fecha entrega</label>
          <input type="date" id="m-fecha">
        </div>
      </div>

      <!-- ÍTEMS -->
      <div style="margin: 16px 0 8px;">
        <label style="font-size:0.8rem;color:#888;text-transform:uppercase;letter-spacing:0.5px;">Prendas del pedido</label>
      </div>
      <div id="items-lista" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;"></div>
      <button class="btn secondary" onclick="agregarItem()" type="button" style="width:100%;margin-bottom:16px;">+ Agregar prenda</button>

      <div class="form-group">
        <label>Notas</label>
        <textarea id="m-notas" placeholder="Observaciones..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="guardarPedido()">Guardar</button>
      <button class="btn secondary" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─── ESTADO ───────────────────────────────────────────────────────────────
  let pedidos = JSON.parse(localStorage.getItem('ws_pedidos2')) || [];
  let nextId  = parseInt(localStorage.getItem('ws_nextId2'))    || 1;

  // Siguiente etapa por estado (dos flujos convergen en 'aprobado')
  const SIGUIENTE = {
    'para-consignar':   'consignado',
    'consignado':       'hacer-diseno',
    'hacer-diseno':     'aprobado',
    'aprobado':         'enviado-calandra',
    'enviado-calandra': 'llego-impresion',
    'llego-impresion':  'corte',
    'corte':            'calidad',
    'calidad':          'costura',
    'costura':          'listo',
    'listo':            'enviado-final',
  };

  // Para compatibilidad con indexOf en renderKanban
  const ETAPAS = ['bandeja','para-consignar','consignado','hacer-diseno','aprobado','enviado-calandra','llego-impresion','corte','calidad','costura','listo','enviado-final'];

  const ETAPA_LABEL = {
    'para-consignar':   'Para consignar',
    'hacer-diseno':     'Hacer diseño',
    'consignado':       'Confirmado',
    'aprobado':         'Aprobado',
    'enviado-calandra': 'Enviado a calandra',
    'llego-impresion':  'Llegó de impresión',
    'corte':            'Corte de tela',
    'calidad':          'Control calidad',
    'costura':          'Costura',
    'listo':            'Listo',
    'arreglos':         'Arreglos',
    'enviado-final':    'Enviado al cliente',
  };

  // ─── FECHA ────────────────────────────────────────────────────────────────
  const dias  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const hoy   = new Date();
  document.getElementById('fecha-header').textContent =
    `${dias[hoy.getDay()]} ${hoy.getDate()} ${meses[hoy.getMonth()]} ${hoy.getFullYear()}`;

  // ─── NAV ──────────────────────────────────────────────────────────────────
  function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
    renderAll();
  }

  // ─── KANBAN DISEÑO ────────────────────────────────────────────────────────
  const COLS_DISENO = [
    { id: 'para-consignar',  css: 'col-para-consignar',  label: '💳 Para consignar' },
    { id: 'hacer-diseno',    css: 'col-hacer-diseno',    label: '✏️ Hacer diseño' },
    { id: 'consignado',      css: 'col-consignado',      label: '✅ Confirmado' },
  ];

  const COLS_PROD = [
    { id: 'aprobado',         css: 'col-aprobado',        label: '✅ Aprobado' },
    { id: 'enviado-calandra', css: 'col-enviado-calandra',label: '📤 Enviado a calandra' },
    { id: 'llego-impresion',  css: 'col-llego-impresion', label: '🖨️ Llegó de impresión' },
    { id: 'corte',            css: 'col-corte',           label: '✂️ Corte de tela' },
    { id: 'calidad',          css: 'col-calidad',         label: '🔍 Control calidad' },
    { id: 'costura',          css: 'col-costura',         label: '🧵 Costura' },
    { id: 'listo',            css: 'col-listo',           label: '🎉 Listo' },
    { id: 'enviado-final',    css: 'col-enviado-cliente2',label: '🚚 Enviado al cliente' },
  ];

  function renderKanban(containerId, cols) {
    const wrap = document.getElementById(containerId);
    if (!wrap) return;
    wrap.innerHTML = cols.map(col => {
      const items = pedidos.filter(p => p.estado === col.id);
      const cards = items.length === 0
        ? `<div class="empty">Sin pedidos</div>`
        : items.map(p => {
            const sigEtapa = SIGUIENTE[p.estado];
            const sigLabel = sigEtapa ? ETAPA_LABEL[sigEtapa] : null;
            const pi       = pedidos.indexOf(p);
            const bloqueado = p.estado === 'calidad' && p.arreglo;

            // Botones según estado
            let acciones = '';
            if (p.estado === 'calidad') {
              if (p.arreglo) {
                // Tiene arreglo pendiente → solo botón "Llegó faltante"
                acciones = `<button class="btn" style="background:#f97316" onclick="llegoFaltante(${pi})">✓ Llegó faltante</button>`;
              } else {
                // Sin arreglo → campo para registrar arreglo + botón avanzar
                acciones = `
                  <input type="text" placeholder="Registrar arreglo..." style="background:#0f1117;border:1px solid #2a2d3a;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:0.8rem;width:100%;margin-bottom:6px;" onchange="registrarArreglo(${pi}, this.value)">
                  <button class="btn" onclick="avanzar(${pi})">→ Costura</button>`;
              }
            } else {
              acciones = sigLabel
                ? `<button class="btn" onclick="avanzar(${pi})">→ ${sigLabel}</button>`
                : '<span style="color:#4ade80;font-size:0.78rem;">✓ Completo</span>';
            }

            return `
            <div class="kanban-card" style="${bloqueado ? 'border-color:#f87171;' : ''}">
              <div class="kc-num">#${p.id}</div>
              <div class="kc-cliente">${p.telefono}</div>
              <div class="kc-producto">${p.items ? p.items.map(it => `${it.prenda} · ${it.tela}`).join('<br>') : (p.producto || '—')}</div>
              <div class="kc-vendedor">👩 ${p.vendedora || '—'}</div>
              ${bloqueado ? `<div style="color:#f87171;font-size:0.78rem;margin-bottom:8px;">⏳ ${p.arreglo}</div>` : ''}
              <div class="kc-actions" style="flex-direction:column;align-items:stretch;">
                ${acciones}
                <button class="btn danger" onclick="eliminar(${pi})" style="margin-top:6px;">✕</button>
              </div>
            </div>`;
          }).join('');
      return `
      <div class="kanban-col ${col.css}">
        <div class="kanban-col-header">
          <span>${col.label}</span>
          <span class="cnt">${items.length}</span>
        </div>
        <div class="kanban-cards">${cards}</div>
      </div>`;
    }).join('');
  }

  function registrarArreglo(i, texto) {
    if (!texto.trim()) return;
    pedidos[i].arreglo = texto.trim();
    guardarLS();
    renderAll();
    toast('Arreglo registrado — pedido bloqueado');
  }

  function llegoFaltante(i) {
    pedidos[i].arreglo = null;
    pedidos[i].estado  = 'costura';
    guardarLS();
    renderAll();
    toast('Faltante recibido → pasó a Costura');
  }

  // ─── BANDEJA ──────────────────────────────────────────────────────────────
  function renderBandeja() {
    const lista = document.getElementById('bandeja-lista');
    if (!lista) return;
    const pendientes = pedidos.filter(p => p.estado === 'bandeja');
    if (pendientes.length === 0) {
      lista.innerHTML = '<div class="empty" style="padding:40px;">Sin pedidos nuevos</div>';
      return;
    }
    lista.innerHTML = pendientes.map(p => {
      const pi = pedidos.indexOf(p);
      const esCotizar = p.tipoBandeja === 'cotizar';
      return `
      <div class="bandeja-card tipo-${p.tipoBandeja || 'pedido'}">
        <div class="b-info">
          <div class="b-num">#${p.id} · ${p.creado ? new Date(p.creado).toLocaleDateString('es-CO') : ''}</div>
          <div class="b-tel">📱 ${p.telefono}</div>
          <div class="b-meta">👩 ${p.vendedora || '—'}</div>
        </div>
        <span class="b-tipo">${esCotizar ? '🎨 Cotización' : '✅ Pedido confirmado'}</span>
        <button class="btn" onclick="abrirCompletar(${pi})">Completar</button>
        <button class="btn danger" onclick="eliminar(${pi})">✕</button>
      </div>`;
    }).join('');
  }

  let completandoIdx = null;

  function abrirCompletar(i) {
    completandoIdx = i;
    tempItems = pedidos[i].items ? [...pedidos[i].items] : [];
    renderItems();
    document.getElementById('m-fecha').value = pedidos[i].fecha || '';
    document.getElementById('m-notas').value = pedidos[i].notas || '';
    // Ocultar campos que ya vienen del bot
    document.getElementById('modal-campos-nuevos').style.display = 'none';
    document.getElementById('modal-overlay').classList.add('open');
  }

  // ─── RENDER ───────────────────────────────────────────────────────────────
  function renderAll() {
    renderBandeja();
    renderKanban('kanban-diseno',    COLS_DISENO);
    renderKanban('kanban-produccion', COLS_PROD);
    actualizarCards();
  }

  function actualizarCards() {
    const cnt = e => pedidos.filter(p => p.estado === e).length;
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    // bandeja
    const bPendientes = pedidos.filter(p => p.estado === 'bandeja');
    set('b-cnt-total',   bPendientes.length);
    set('b-cnt-cotizar', bPendientes.filter(p => p.tipoBandeja === 'cotizar').length);
    set('b-cnt-pedido',  bPendientes.filter(p => p.tipoBandeja === 'pedido').length);
    // diseño
    set('d-cnt-hacer',     cnt('hacer-diseno'));
    set('d-cnt-consignar', cnt('para-consignar'));
    set('d-cnt-consignado',cnt('consignado'));
    // producción
    set('p-cnt-aprobado',  cnt('aprobado'));
    set('p-cnt-calandra',  cnt('enviado-calandra'));
    set('p-cnt-impresion', cnt('llego-impresion'));
    set('p-cnt-corte',     cnt('corte'));
    set('p-cnt-calidad',   cnt('calidad'));
    set('p-cnt-costura',   cnt('costura'));
    // producción — listo y enviado
    set('p-cnt-listo',     cnt('listo'));
    set('p-cnt-enviado',   cnt('enviado-final'));
  }

  // ─── ACCIONES ─────────────────────────────────────────────────────────────
  function avanzar(i) {
    const sig = SIGUIENTE[pedidos[i].estado];
    if (sig) {
      pedidos[i].estado = sig;
      guardarLS();
      renderAll();
      toast('Movido a: ' + ETAPA_LABEL[sig]);
    }
  }

  function eliminar(i) {
    if (!confirm('¿Eliminar este pedido?')) return;
    pedidos.splice(i, 1);
    guardarLS();
    renderAll();
    toast('Pedido eliminado');
  }

  // ─── MODAL ────────────────────────────────────────────────────────────────
  function onTipoChange() {
    const tipo = document.getElementById('m-tipobandeja').value;
    const extra = document.getElementById('modal-pedido-extra');
    if (extra) extra.style.display = tipo === 'cotizar' ? 'none' : '';
  }

  function abrirModal() {
    completandoIdx = null;
    tempItems = [];
    renderItems();
    ['m-telefono','m-fecha','m-notas'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('m-vendedora').selectedIndex = 0;
    document.getElementById('m-tipobandeja').selectedIndex = 0;
    document.getElementById('modal-campos-nuevos').style.display = '';
    document.getElementById('modal-overlay').classList.add('open');
    onTipoChange(); // aplicar visibilidad inicial
  }
  function cerrarModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) cerrarModal();
  });

  // ─── ÍTEMS ────────────────────────────────────────────────────────────────
  const PRENDAS = ['Camiseta','Uniforme completo','Pantalón','Chaqueta','Buso','Sudadera','Portero acolchado buso','Portero acolchado pantalón','Camiseta adicional'];
  const TELAS   = ['Normal','Antifluido','Dry Fit','Camuflada','Colmena','Cuadros'];

  let tempItems = [];

  function agregarItem() {
    tempItems.push({ prenda: '', tela: '', cantidad: '' });
    renderItems();
  }

  function quitarItem(i) {
    tempItems.splice(i, 1);
    renderItems();
  }

  function renderItems() {
    const lista = document.getElementById('items-lista');
    if (!lista) return;
    if (tempItems.length === 0) {
      lista.innerHTML = '<div style="color:#555;font-size:0.85rem;padding:8px 0;">Sin prendas — agrega al menos una</div>';
      return;
    }
    lista.innerHTML = tempItems.map((item, i) => `
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;background:#0f1117;padding:10px;border-radius:8px;border:1px solid #2a2d3a;">
        <select onchange="tempItems[${i}].prenda=this.value" style="background:#1a1d27;border:1px solid #2a2d3a;color:#e0e0e0;padding:8px;border-radius:6px;font-size:0.85rem;">
          <option value="">Prenda...</option>
          ${PRENDAS.map(p => `<option value="${p}" ${item.prenda===p?'selected':''}>${p}</option>`).join('')}
        </select>
        <select onchange="tempItems[${i}].tela=this.value" style="background:#1a1d27;border:1px solid #2a2d3a;color:#e0e0e0;padding:8px;border-radius:6px;font-size:0.85rem;">
          <option value="">Tela...</option>
          ${TELAS.map(t => `<option value="${t}" ${item.tela===t?'selected':''}>${t}</option>`).join('')}
        </select>
        <button class="btn danger" onclick="quitarItem(${i})" style="padding:8px 10px;">✕</button>
      </div>
    `).join('');
  }

  function guardarPedido() {
    const telefono  = document.getElementById('m-telefono').value.trim();
    const vendedora = document.getElementById('m-vendedora').value;
    const tipoBandeja = document.getElementById('m-tipobandeja').value;
    if (!telefono)  { alert('Escribe el número de WhatsApp'); return; }
    if (!vendedora) { alert('Selecciona la vendedora'); return; }

    // Solo validar ítems si es pedido confirmado (no cotización)
    if (tipoBandeja !== 'cotizar') {
      if (tempItems.length === 0) { alert('Agrega al menos una prenda'); return; }
      if (tempItems.some(it => !it.prenda || !it.tela)) { alert('Selecciona prenda y tela en cada ítem'); return; }
    }

    let msg;
    if (completandoIdx !== null) {
      // Completando pedido desde bandeja
      const p = pedidos[completandoIdx];
      p.items  = [...tempItems];
      p.fecha  = document.getElementById('m-fecha').value;
      p.notas  = document.getElementById('m-notas').value.trim();
      p.estado = p.tipoBandeja === 'cotizar' ? 'hacer-diseno' : 'para-consignar';
      msg = 'Pedido completado';
      completandoIdx = null;
    } else {
      // Nuevo pedido manual
      pedidos.push({
        id:          nextId++,
        telefono,
        vendedora,
        tipoBandeja,
        items:       tipoBandeja !== 'cotizar' ? [...tempItems] : [],
        fecha:       tipoBandeja !== 'cotizar' ? document.getElementById('m-fecha').value : '',
        notas:       tipoBandeja !== 'cotizar' ? document.getElementById('m-notas').value.trim() : '',
        estado:      tipoBandeja === 'cotizar' ? 'hacer-diseno' : 'bandeja',
        creado:      new Date().toISOString(),
      });
      msg = tipoBandeja === 'cotizar' ? 'Cotización creada → Diseño' : 'Pedido creado en bandeja';
    }

    guardarLS();
    cerrarModal();
    renderAll();
    toast(msg);
  }

  // ─── UTILS ────────────────────────────────────────────────────────────────
  function guardarLS() {
    localStorage.setItem('ws_pedidos2', JSON.stringify(pedidos));
    localStorage.setItem('ws_nextId2',  nextId);
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = '✓ ' + msg;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
  }

  // ─── INIT ─────────────────────────────────────────────────────────────────
  renderAll();
</script>
</body>
</html>
