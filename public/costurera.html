<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mis lotes — W&S Textil</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:           #000;
      --surface:      rgba(17,17,19,0.7);
      --border:       rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14);
      --text:         #fafafa;
      --text-2:       #ededed;
      --text-muted:   #888;
      --text-subtle:  #555;
      --green:        #10b981;
      --green-glow:   rgba(16,185,129,0.4);
      --red:          #ef4444;
      --yellow:       #fbbf24;
      --accent:       #8b5cf6;
      --radius:       12px;
      --radius-lg:    18px;
      --radius-full:  999px;
      --ease-out:     cubic-bezier(0.16, 1, 0.3, 1);
      --blur:         blur(20px) saturate(180%);
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      letter-spacing: -0.011em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: 'cv02','cv03','cv04','cv11';
    }

    body {
      padding: 28px 18px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient glow Vercel-style */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 30% 0%, rgba(16,185,129,0.10), transparent 50%),
        radial-gradient(circle at 70% 100%, rgba(139,92,246,0.06), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .content { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

    /* ── HEADER ──────────────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 32px;
      animation: fade-in 600ms var(--ease-out);
    }
    .greeting {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .greeting::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }
    .name {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      background: linear-gradient(135deg, var(--green) 0%, #34d399 60%, #6ee7b7 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-weight: 500;
    }
    .brand {
      margin-top: 16px;
      font-size: 0.66rem;
      letter-spacing: 4px;
      color: var(--text-subtle);
      font-weight: 700;
      text-transform: uppercase;
    }

    /* ── STATS SUMMARY ───────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 24px;
      animation: fade-in 600ms 100ms var(--ease-out) both;
    }
    .stat {
      background: var(--surface);
      backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      text-align: center;
    }
    .stat-num {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      line-height: 1;
    }
    .stat-num.urgent { color: var(--red); }
    .stat-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
      font-weight: 700;
    }

    /* ── LOTE CARDS ──────────────────────────────────────────────── */
    .lote-card {
      background: var(--surface);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
      transition: all 200ms var(--ease-out);
      animation: fade-in 500ms var(--ease-out) both;
      position: relative;
      overflow: hidden;
    }
    .lote-card:nth-child(2) { animation-delay: 80ms; }
    .lote-card:nth-child(3) { animation-delay: 160ms; }
    .lote-card:nth-child(4) { animation-delay: 240ms; }
    .lote-card:nth-child(5) { animation-delay: 320ms; }

    .lote-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--green);
      border-radius: 3px 0 0 3px;
    }
    .lote-card.urgente::before { background: var(--red); }
    .lote-card.urgente {
      border-color: rgba(239,68,68,0.30);
      box-shadow: 0 0 24px rgba(239,68,68,0.08);
    }

    .lote-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }
    .lote-equipo {
      font-size: 1.08rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      line-height: 1.2;
    }
    .lote-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-subtle);
      font-weight: 600;
      flex-shrink: 0;
    }

    .lote-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
      color: var(--text-2);
      font-weight: 500;
    }
    .chip.urgent {
      background: rgba(239,68,68,0.08);
      border-color: rgba(239,68,68,0.30);
      color: #fca5a5;
    }
    .chip-icon { opacity: 0.6; }

    .lote-detalles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px;
      background: rgba(255,255,255,0.02);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .detalle-label {
      font-size: 0.62rem;
      color: var(--text-subtle);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      font-weight: 700;
    }
    .detalle-value {
      font-size: 0.98rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.015em;
    }
    .detalle-value.large {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    .lote-obs {
      background: rgba(251,191,36,0.06);
      border: 1px solid rgba(251,191,36,0.20);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 0.82rem;
      color: #fcd34d;
      margin-bottom: 14px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .lote-obs::before {
      content: '※';
      font-size: 1rem;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* ── BTN ENTREGUE PREMIUM ────────────────────────────────────── */
    .btn-entregue {
      width: 100%;
      background: linear-gradient(180deg, var(--green) 0%, #059669 100%);
      border: 1px solid rgba(16,185,129,0.5);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      padding: 15px;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: -0.011em;
      box-shadow:
        0 0 0 1px rgba(16,185,129,0.2) inset,
        0 4px 12px var(--green-glow);
      transition: all 200ms var(--ease-out);
      position: relative;
      overflow: hidden;
    }
    .btn-entregue:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(16,185,129,0.4) inset,
        0 8px 24px var(--green-glow);
    }
    .btn-entregue:active { transform: translateY(0); }
    .btn-entregue::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 400ms;
    }
    .btn-entregue:active::after { opacity: 1; transition: opacity 0s; }

    .btn-entregue.confirmado {
      background: rgba(16,185,129,0.10);
      border-color: rgba(16,185,129,0.35);
      color: #6ee7b7;
      cursor: default;
      box-shadow: none;
    }
    .btn-entregue.confirmado:hover { transform: none; box-shadow: none; }

    /* ── EMPTY STATE ─────────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      animation: fade-in 600ms var(--ease-out);
    }
    .empty-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.20);
      font-size: 2.5rem;
      margin-bottom: 20px;
      box-shadow: 0 0 32px rgba(16,185,129,0.15);
    }
    .empty-title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .empty-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── LOADER ──────────────────────────────────────────────────── */
    .loader {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 700ms linear infinite;
      margin-bottom: 14px;
    }

    /* ── SKELETON ────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 0%,
        rgba(255,255,255,0.08) 50%,
        rgba(255,255,255,0.03) 100%
      );
      background-size: 1000px 100%;
      animation: shimmer 2s linear infinite;
      border-radius: var(--radius);
    }
    .skeleton.card { height: 180px; margin-bottom: 14px; }

    /* ── TOAST ───────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(14,14,16,0.92);
      backdrop-filter: var(--blur);
      color: var(--text);
      padding: 12px 24px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.88rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      z-index: 9999;
      opacity: 0;
      transition: all 250ms var(--ease-out);
      display: flex;
      align-items: center;
      gap: 8px;
      letter-spacing: -0.011em;
      max-width: 90vw;
    }
    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(16,185,129,0.4); }
    .toast.error { border-color: rgba(239,68,68,0.4); color: #fca5a5; }

    /* ── KEYFRAMES ───────────────────────────────────────────────── */
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 10px var(--green); transform: scale(1); }
      50%      { box-shadow: 0 0 18px var(--green); transform: scale(1.2); }
    }
    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }

    /* ── SELECCION ──────────────────────────────────────────────── */
    ::selection { background: var(--green); color: #000; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
  </style>
</head>
<body>
  <div class="content">
    <div class="header">
      <div class="greeting">Hola</div>
      <div class="name" id="nombre-costurera">...</div>
      <div class="subtitle">Estos son tus lotes pendientes</div>
      <div class="brand">W&S TEXTIL · COSTURA</div>
    </div>

    <div id="stats-container"></div>
    <div id="lista-lotes">
      <div class="skeleton card"></div>
      <div class="skeleton card" style="opacity:0.6"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const slug = window.location.pathname.split('/').filter(Boolean)[1];
    if (!slug) {
      document.body.innerHTML = '<div class="content"><div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">URL inválida</div></div></div>';
    }

    function toast(msg, tipo) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast visible ' + (tipo || '');
      setTimeout(() => t.classList.remove('visible'), 3000);
    }

    function fmtFecha(iso) {
      try {
        return new Date(iso).toLocaleDateString('es-CO', { day: '2-digit', month: 'short' });
      } catch { return iso; }
    }

    function diasDesde(iso) {
      try {
        return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
      } catch { return 0; }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function renderStats(pendientes) {
      const total = pendientes.length;
      const totalPrendas = pendientes.reduce((s, m) => s + (m.cantidad_enviada || 0), 0);
      const urgentes = pendientes.filter(m => diasDesde(m.fecha_envio) >= 7).length;
      const cont = document.getElementById('stats-container');
      if (!total) { cont.innerHTML = ''; return; }
      cont.innerHTML = `
        <div class="stats">
          <div class="stat">
            <div class="stat-num">${total}</div>
            <div class="stat-label">Lotes</div>
          </div>
          <div class="stat">
            <div class="stat-num">${totalPrendas}</div>
            <div class="stat-label">Prendas</div>
          </div>
          <div class="stat">
            <div class="stat-num ${urgentes > 0 ? 'urgent' : ''}">${urgentes}</div>
            <div class="stat-label">Urgentes</div>
          </div>
        </div>
      `;
    }

    async function cargar() {
      try {
        const r = await fetch('/api/c/' + slug + '/lotes');
        if (!r.ok) {
          document.getElementById('lista-lotes').innerHTML =
            '<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">No se pudo cargar</div><div class="empty-sub">Revisa tu conexión</div></div>';
          return;
        }
        const data = await r.json();
        document.getElementById('nombre-costurera').textContent = data.costurera.nombre;

        renderStats(data.pendientes);
        const cont = document.getElementById('lista-lotes');

        if (!data.pendientes.length) {
          cont.innerHTML = `
            <div class="empty">
              <div class="empty-icon">✨</div>
              <div class="empty-title">Día tranquilo</div>
              <div class="empty-sub">No tienes lotes pendientes ahora.<br>Buen trabajo 💚</div>
            </div>
          `;
          return;
        }

        let html = '';
        for (const m of data.pendientes) {
          const dias = diasDesde(m.fecha_envio);
          const urgente = dias >= 7;
          const yaConfirmo = m.confirmado_costurera == 1;
          html += `
            <div class="lote-card${urgente ? ' urgente' : ''}">
              <div class="lote-head">
                <div class="lote-equipo">${escapeHtml(m.equipo || 'Lote sin equipo')}</div>
                <div class="lote-id">#${m.id}</div>
              </div>
              <div class="lote-meta">
                <span class="chip"><span class="chip-icon">📅</span>${fmtFecha(m.fecha_envio)}</span>
                <span class="chip${urgente ? ' urgent' : ''}"><span class="chip-icon">⏱</span>${dias} día${dias !== 1 ? 's' : ''}</span>
              </div>
              <div class="lote-detalles">
                <div>
                  <div class="detalle-label">Prenda</div>
                  <div class="detalle-value">${escapeHtml(m.prenda || '—')}</div>
                </div>
                <div>
                  <div class="detalle-label">Cantidad</div>
                  <div class="detalle-value large">${m.cantidad_enviada}</div>
                </div>
              </div>
              ${m.observaciones ? `<div class="lote-obs">${escapeHtml(m.observaciones)}</div>` : ''}
              ${yaConfirmo
                ? `<button class="btn-entregue confirmado">✅ Ya marcaste como entregado</button>`
                : `<button class="btn-entregue" onclick="confirmar(${m.id})">✅ Ya lo entregué</button>`}
            </div>
          `;
        }
        cont.innerHTML = html;
      } catch (e) {
        document.getElementById('lista-lotes').innerHTML =
          `<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">Error</div><div class="empty-sub">${escapeHtml(e.message)}</div></div>`;
      }
    }

    async function confirmar(id) {
      if (!confirm('¿Confirmar que ya entregaste este lote?')) return;
      try {
        const r = await fetch('/api/costureras/confirmar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ movimiento_id: id, costurera_slug: slug }),
        });
        const data = await r.json();
        if (!r.ok || !data.ok) throw new Error(data.error || 'falló');
        toast('✅ Marcado. Avisamos al taller.', 'success');
        setTimeout(cargar, 800);
      } catch (e) {
        toast('Error: ' + e.message, 'error');
      }
    }

    cargar();
    setInterval(cargar, 60000);
  </script>
</body>
</html>
