<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produccion W&S</title>
  <link rel="icon" type="image/png" href="/icon.png">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070a10;
      --panel: #101722;
      --line: rgba(255,255,255,0.08);
      --muted: #93a4b8;
      --text: #eef5ff;
      --cyan: #0ea5e9;
      --green: #22c55e;
      --purple: #a855f7;
      --orange: #f59e0b;
      --red: #ef4444;
    }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, rgba(14,165,233,0.12), transparent 34%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 12px;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(7,10,16,0.92);
      backdrop-filter: blur(12px);
      padding-bottom: 10px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(14,165,233,0.28);
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(14,165,233,0.16), rgba(168,85,247,0.10));
    }
    h1 {
      font-family: Outfit, sans-serif;
      font-size: clamp(1.35rem, 6vw, 2.1rem);
      line-height: 1;
    }
    .sub { color: var(--muted); font-size: 0.78rem; margin-top: 5px; }
    .guide {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .guide-step {
      border: 1px solid rgba(14,165,233,0.22);
      border-radius: 14px;
      background: rgba(14,165,233,0.08);
      padding: 10px;
      min-height: 70px;
    }
    .guide-num {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: inline-grid;
      place-items: center;
      background: #0ea5e9;
      color: white;
      font-weight: 900;
      margin-bottom: 6px;
    }
    .guide-step strong {
      display: block;
      font-size: .82rem;
      line-height: 1.15;
    }
    .guide-step span {
      display: block;
      color: var(--muted);
      font-size: .72rem;
      margin-top: 3px;
      line-height: 1.25;
    }
    .refresh {
      border: 1px solid rgba(14,165,233,0.45);
      background: rgba(14,165,233,0.18);
      color: #7dd3fc;
      padding: 10px 12px;
      border-radius: 12px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .role-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .role-link {
      text-decoration: none;
      color: var(--text);
      text-align: center;
      padding: 10px 8px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      font-size: 0.78rem;
      font-weight: 800;
    }
    .role-link.active { background: rgba(14,165,233,0.18); border-color: rgba(14,165,233,0.42); color: #7dd3fc; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .summary-card {
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,0.04);
      padding: 11px;
    }
    .summary-card strong { display: block; font-family: Outfit, sans-serif; font-size: 1.5rem; line-height: 1; }
    .summary-card span { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: .6px; }
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.05);
      color: #cbd5e1;
      padding: 10px 13px;
      border-radius: 999px;
      font: inherit;
      font-size: 0.83rem;
      font-weight: 800;
      cursor: pointer;
    }
    .filter.active { background: rgba(14,165,233,0.22); border-color: rgba(14,165,233,0.58); color: #7dd3fc; }
    .count { opacity: .8; margin-left: 4px; }
    .worklist { display: grid; gap: 10px; padding-bottom: 84px; }
    .task-card {
      border: 1px solid var(--line);
      border-left: 4px solid var(--cyan);
      border-radius: 16px;
      background: rgba(16,23,34,0.92);
      padding: 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }
    .task-card.overdue { border-left-color: var(--red); }
    .task-card.today { border-left-color: var(--orange); }
    .task-card.stale { border-left-color: var(--purple); }
    .task-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .task-title {
      font-family: Outfit, sans-serif;
      font-size: 1.18rem;
      line-height: 1.15;
      word-break: break-word;
    }
    .task-id { color: var(--muted); font-size: .75rem; font-weight: 800; white-space: nowrap; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 9px 0 12px;
    }
    .pill {
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #dbeafe;
      font-size: .75rem;
      font-weight: 800;
    }
    .pill.red { background: rgba(239,68,68,0.18); color: #fecaca; }
    .pill.orange { background: rgba(245,158,11,0.18); color: #fde68a; }
    .pill.green { background: rgba(34,197,94,0.16); color: #bbf7d0; }
    .pill.purple { background: rgba(168,85,247,0.18); color: #e9d5ff; }
    .next-box {
      border: 1px solid rgba(14,165,233,0.25);
      border-radius: 14px;
      background: rgba(14,165,233,0.08);
      padding: 10px;
      margin: 10px 0 12px;
    }
    .next-label {
      color: #7dd3fc;
      font-size: .72rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 4px;
    }
    .next-text {
      font-family: Outfit, sans-serif;
      font-size: 1.05rem;
      line-height: 1.1;
    }
    .actions { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .primary-action, .secondary-action {
      border: 0;
      border-radius: 13px;
      color: white;
      padding: 16px 12px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }
    .primary-action {
      min-height: 58px;
      font-size: 1rem;
      box-shadow: 0 10px 22px rgba(0,0,0,0.22);
    }
    .primary-action small {
      display: block;
      font-size: .72rem;
      opacity: .9;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .secondary-action {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: #dbeafe;
      min-width: 86px;
    }
    .a-cyan { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }
    .a-purple { background: linear-gradient(135deg, #a855f7, #7c3aed); }
    .a-green { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .a-dark { background: linear-gradient(135deg, #15803d, #166534); }
    .a-red { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 52px 14px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
    }
    .toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 18px;
      z-index: 40;
      background: rgba(34,197,94,0.96);
      color: white;
      padding: 14px 16px;
      border-radius: 14px;
      text-align: center;
      font-weight: 900;
      opacity: 0;
      transform: translateY(18px);
      transition: .18s ease;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: rgba(239,68,68,0.96); }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      background: rgba(0,0,0,0.68);
      padding: 16px;
      overflow-y: auto;
    }
    .modal.open { display: block; }
    .sheet {
      max-width: 620px;
      margin: 5vh auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #101722;
      padding: 16px;
    }
    .sheet-head { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
    .close {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-weight: 900;
      cursor: pointer;
    }
    .detail-grid { display: grid; gap: 8px; margin: 12px 0; }
    .detail-row {
      display: grid;
      grid-template-columns: 105px 1fr;
      gap: 10px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: #dbeafe;
      font-size: .9rem;
    }
    .detail-row span { color: var(--muted); font-weight: 800; }
    .items { display: grid; gap: 6px; }
    .item { padding: 9px 10px; border-radius: 11px; background: rgba(255,255,255,0.04); }
    textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 12px;
      font: inherit;
      margin-top: 8px;
    }
    .sheet-actions { display: grid; gap: 8px; margin-top: 12px; }
    @media (min-width: 760px) {
      body { padding: 18px; }
      .worklist { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
      .summary { grid-template-columns: repeat(6, minmax(0, 1fr)); }
      .role-row { grid-template-columns: repeat(4, 150px); }
      .topbar { position: static; }
    }
    @media (max-width: 420px) {
      .role-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .guide { grid-template-columns: 1fr; }
      .guide-step { min-height: auto; }
      .actions { grid-template-columns: 1fr; }
      .secondary-action { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="header">
      <div>
        <h1>Produccion W&S</h1>
        <div class="sub" id="info-sync">Actualizado: -</div>
      </div>
      <button class="refresh" onclick="cargar()">Refrescar</button>
    </div>
    <section class="guide" aria-label="Como usar">
      <div class="guide-step"><div class="guide-num">1</div><strong>Escoge donde estas</strong><span>Usa los botones de filtro.</span></div>
      <div class="guide-step"><div class="guide-num">2</div><strong>Busca el pedido</strong><span>Los urgentes salen primero.</span></div>
      <div class="guide-step"><div class="guide-num">3</div><strong>Toca el boton grande</strong><span>Asi avanza el trabajo.</span></div>
    </section>
    <nav class="role-row">
      <a class="role-link" href="/#/movil">Areas</a>
      <a class="role-link" href="/#/ventas">Ventas</a>
      <a class="role-link" href="/#/diseno">Diseno</a>
      <a class="role-link active" href="/produccion.html">Produccion</a>
    </nav>
    <div class="summary">
      <div class="summary-card"><strong id="s-urgentes">0</strong><span>Urgentes</span></div>
      <div class="summary-card"><strong id="s-hoy">0</strong><span>Hoy</span></div>
      <div class="summary-card"><strong id="s-stale">0</strong><span>Sin mov.</span></div>
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <main class="worklist" id="worklist"></main>

  <div class="modal" id="modal" onclick="cerrarDetalle(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-head">
        <div>
          <div class="task-id" id="d-id"></div>
          <h2 class="task-title" id="d-title"></h2>
        </div>
        <button class="close" onclick="cerrarDetalle()">X</button>
      </div>
      <div class="meta" id="d-pills"></div>
      <div class="detail-grid" id="d-detail"></div>
      <div>
        <strong>Prendas</strong>
        <div class="items" id="d-items"></div>
      </div>
      <div style="margin-top:14px;">
        <strong>Reportar arreglo</strong>
        <textarea id="arreglo-text" placeholder="Ej: falta una manga talla M, revisar numero 10..."></textarea>
      </div>
      <div class="sheet-actions" id="d-actions"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let pedidos = [];
    let filtroActivo = 'todos';
    let pedidoDetalle = null;

    const ESTADOS = ['enviado-calandra', 'llego-impresion', 'corte', 'calidad', 'costura', 'listo'];
    const FILTROS = [
      ['todos', 'Todo'],
      ['enviado-calandra', 'Calandra'],
      ['llego-impresion', 'Llego'],
      ['corte', 'Corte'],
      ['calidad', 'Calidad'],
      ['costura', 'Costura'],
      ['listo', 'Listo']
    ];
    const LABELS = {
      'enviado-calandra': 'Calandra',
      'llego-impresion': 'Llego impresion',
      'corte': 'Corte',
      'calidad': 'Calidad',
      'costura': 'Costura',
      'listo': 'Listo'
    };
    const ACCIONES = {
      'enviado-calandra': { proximo: 'llego-impresion', texto: 'Llego impresion', clase: 'a-cyan' },
      'llego-impresion': { proximo: 'costura', texto: 'Pasar a costura', clase: 'a-purple' },
      'corte': { proximo: 'calidad', texto: 'Pasar a calidad', clase: 'a-purple' },
      'calidad': { proximo: 'costura', texto: 'Pasar a costura', clase: 'a-purple' },
      'costura': { proximo: 'listo', texto: 'Marcar listo', clase: 'a-green' },
      'listo': { proximo: 'enviado-final', texto: 'Entregado', clase: 'a-dark' }
    };

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
    function toast(msg, tipo) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (tipo === 'error' ? ' error' : '');
      setTimeout(() => t.className = 'toast', 2600);
    }
    function parseDate(p) {
      if (!p.fechaEntrega) return null;
      const d = new Date(p.fechaEntrega + 'T00:00:00');
      return Number.isNaN(d.getTime()) ? null : d;
    }
    function diasEntrega(p) {
      const d = parseDate(p);
      if (!d) return null;
      const hoy = new Date();
      hoy.setHours(0,0,0,0);
      return Math.round((d - hoy) / 86400000);
    }
    function horasSinMovimiento(p) {
      const raw = p.ultimoMovimiento || p.creadoEn;
      const t = raw ? new Date(raw).getTime() : 0;
      return t ? (Date.now() - t) / 3600000 : 999;
    }
    function prioridad(p) {
      const d = diasEntrega(p);
      const stale = horasSinMovimiento(p);
      if (d !== null && d < 0) return 0;
      if (d === 0) return 1;
      if (d !== null && d <= 2) return 2;
      if (stale >= 48) return 3;
      return 4;
    }
    function estadoUrgencia(p) {
      const d = diasEntrega(p);
      if (d !== null && d < 0) return { texto: 'Vencido ' + Math.abs(d) + 'd', cls: 'red', card: 'overdue' };
      if (d === 0) return { texto: 'Entrega hoy', cls: 'orange', card: 'today' };
      if (d !== null && d <= 2) return { texto: d + 'd para entrega', cls: 'orange', card: 'today' };
      if (horasSinMovimiento(p) >= 48) return { texto: 'Sin movimiento', cls: 'purple', card: 'stale' };
      return null;
    }
    function itemsPedido(p) {
      return Array.isArray(p.items) ? p.items : [];
    }
    function cantidadPedido(p) {
      const items = itemsPedido(p);
      if (!items.length) return '';
      return items.length + ' prenda' + (items.length === 1 ? '' : 's');
    }
    function renderFiltros() {
      const cont = document.getElementById('filters');
      const enProd = pedidos.filter(p => ESTADOS.includes(p.estado));
      cont.innerHTML = FILTROS.map(([key, label]) => {
        const total = key === 'todos' ? enProd.length : enProd.filter(p => p.estado === key).length;
        return '<button class="filter ' + (filtroActivo === key ? 'active' : '') + '" onclick="setFiltro(\'' + key + '\')">' + label + '<span class="count">' + total + '</span></button>';
      }).join('');
    }
    function renderSummary() {
      const enProd = pedidos.filter(p => ESTADOS.includes(p.estado));
      document.getElementById('s-urgentes').textContent = enProd.filter(p => {
        const d = diasEntrega(p);
        return d !== null && d <= 2;
      }).length;
      document.getElementById('s-hoy').textContent = enProd.filter(p => diasEntrega(p) === 0).length;
      document.getElementById('s-stale').textContent = enProd.filter(p => horasSinMovimiento(p) >= 48).length;
    }
    function setFiltro(f) {
      filtroActivo = f;
      render();
    }
    function render() {
      renderFiltros();
      renderSummary();
      const cont = document.getElementById('worklist');
      let lista = pedidos.filter(p => ESTADOS.includes(p.estado));
      if (filtroActivo !== 'todos') lista = lista.filter(p => p.estado === filtroActivo);
      lista.sort((a, b) => {
        const pa = prioridad(a), pb = prioridad(b);
        if (pa !== pb) return pa - pb;
        const fa = parseDate(a)?.getTime() ?? Infinity;
        const fb = parseDate(b)?.getTime() ?? Infinity;
        return fa - fb;
      });
      if (!lista.length) {
        cont.innerHTML = '<div class="empty"><h2>Todo limpio</h2><p>No hay pedidos en este filtro.</p></div>';
        return;
      }
      cont.innerHTML = lista.map(cardHtml).join('');
    }
    function cardHtml(p) {
      const accion = ACCIONES[p.estado];
      const urg = estadoUrgencia(p);
      const pills = [
        '<span class="pill green">' + esc(LABELS[p.estado] || p.estado) + '</span>',
        urg ? '<span class="pill ' + urg.cls + '">' + esc(urg.texto) + '</span>' : '',
        p.fechaEntrega ? '<span class="pill">Fecha ' + esc(p.fechaEntrega) + '</span>' : '',
        cantidadPedido(p) ? '<span class="pill">' + esc(cantidadPedido(p)) + '</span>' : ''
      ].filter(Boolean).join('');
      return '<article class="task-card ' + (urg ? urg.card : '') + '">' +
        '<div class="task-head">' +
          '<div class="task-title">' + esc(p.equipo || p.telefono || 'Pedido sin nombre') + '</div>' +
          '<div class="task-id">#' + p.id + '</div>' +
        '</div>' +
        '<div class="meta">' + pills + '</div>' +
        '<div class="meta">' +
          (p.vendedora ? '<span class="pill">Venta: ' + esc(p.vendedora) + '</span>' : '') +
          (p.disenadorAsignado ? '<span class="pill">Diseno: ' + esc(p.disenadorAsignado) + '</span>' : '') +
        '</div>' +
        '<div class="next-box">' +
          '<div class="next-label">Siguiente paso</div>' +
          '<div class="next-text">' + esc(accion.texto) + '</div>' +
        '</div>' +
        '<div class="actions">' +
          '<button class="primary-action ' + accion.clase + '" onclick="avanzar(' + p.id + ', \'' + accion.proximo + '\', \'' + accion.texto + '\')"><small>Tocar aqui</small>' + esc(accion.texto) + '</button>' +
          '<button class="secondary-action" onclick="abrirDetalle(' + p.id + ')">Detalles</button>' +
        '</div>' +
      '</article>';
    }
    async function cargar() {
      try {
        const r = await fetch('/api/pedidos');
        const data = await r.json();
        pedidos = Array.isArray(data) ? data : (data.pedidos || []);
        document.getElementById('info-sync').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        render();
      } catch (e) {
        toast('Error al cargar pedidos', 'error');
      }
    }
    async function avanzar(id, proximo, texto) {
      const p = pedidos.find(x => x.id === id);
      if (!p) return;
      const nombre = p.equipo || '#' + id;
      const msg = proximo === 'enviado-final' ? 'Confirmar entrega de ' + nombre + '?' : texto + ' - ' + nombre + '?';
      if (!confirm(msg)) return;
      try {
        const r = await fetch('/api/pedidos/' + id + '/avanzar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ estado: proximo })
        });
        const data = await r.json();
        if (!r.ok || !data.ok) throw new Error(data.error || 'fallo');
        toast(data.archivado ? 'Archivado en Notion' : texto);
        cerrarDetalle();
        cargar();
      } catch (e) {
        toast('Error: ' + e.message, 'error');
      }
    }
    async function patchPedido(id, cambios) {
      const r = await fetch('/api/pedidos/' + id, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(cambios)
      });
      const data = await r.json();
      if (!r.ok || !data.ok) throw new Error(data.error || 'No se pudo guardar');
      return data.pedido;
    }
    async function editarNombre(id) {
      const p = pedidos.find(x => x.id === id);
      if (!p) return;
      const nuevo = prompt('Nombre del equipo o pedido:', p.equipo || '');
      if (nuevo === null) return;
      try {
        await patchPedido(id, { equipo: nuevo.trim() });
        toast('Nombre guardado');
        cargar();
      } catch (e) {
        toast('Error: ' + e.message, 'error');
      }
    }
    function abrirDetalle(id) {
      const p = pedidos.find(x => x.id === id);
      if (!p) return;
      pedidoDetalle = p;
      const urg = estadoUrgencia(p);
      const accion = ACCIONES[p.estado];
      document.getElementById('d-id').textContent = 'Pedido #' + p.id;
      document.getElementById('d-title').textContent = p.equipo || p.telefono || 'Pedido sin nombre';
      document.getElementById('d-pills').innerHTML = [
        '<span class="pill green">' + esc(LABELS[p.estado] || p.estado) + '</span>',
        urg ? '<span class="pill ' + urg.cls + '">' + esc(urg.texto) + '</span>' : ''
      ].filter(Boolean).join('');
      document.getElementById('d-detail').innerHTML = [
        ['Telefono', p.telefono || '-'],
        ['Vendedora', p.vendedora || '-'],
        ['Disenador', p.disenadorAsignado || '-'],
        ['Entrega', p.fechaEntrega || '-'],
        ['Notas', p.notas || '-'],
        ['Ult. mov.', p.ultimoMovimiento ? new Date(p.ultimoMovimiento).toLocaleString('es-CO') : '-']
      ].map(([a,b]) => '<div class="detail-row"><span>' + esc(a) + '</span><div>' + esc(b) + '</div></div>').join('');
      const items = itemsPedido(p);
      document.getElementById('d-items').innerHTML = items.length
        ? items.map(i => '<div class="item">' + esc([i.prenda, i.tela, i.cantidad ? 'x' + i.cantidad : ''].filter(Boolean).join(' - ')) + '</div>').join('')
        : '<div class="item">Sin prendas registradas</div>';
      document.getElementById('arreglo-text').value = '';
      document.getElementById('d-actions').innerHTML =
        '<button class="primary-action ' + accion.clase + '" onclick="avanzar(' + p.id + ', \'' + accion.proximo + '\', \'' + accion.texto + '\')"><small>Tocar aqui</small>' + accion.texto + '</button>' +
        '<button class="primary-action a-red" onclick="reportarArreglo()"><small>Si hay problema</small>Reportar arreglo</button>' +
        '<button class="secondary-action" onclick="editarNombre(' + p.id + ')">Editar nombre</button>';
      document.getElementById('modal').classList.add('open');
    }
    function cerrarDetalle(ev) {
      if (ev && ev.target.id !== 'modal') return;
      document.getElementById('modal').classList.remove('open');
      pedidoDetalle = null;
    }
    async function reportarArreglo() {
      if (!pedidoDetalle) return;
      const faltante = document.getElementById('arreglo-text').value.trim();
      if (!faltante) {
        toast('Escribe que falta o que se debe arreglar', 'error');
        return;
      }
      try {
        const r = await fetch('/api/arreglos/agregar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            pedidoId: pedidoDetalle.id,
            equipo: pedidoDetalle.equipo || pedidoDetalle.telefono || ('#' + pedidoDetalle.id),
            faltante,
            disenador: pedidoDetalle.disenadorAsignado || 'Sin asignar'
          })
        });
        const data = await r.json();
        if (!r.ok || !data.ok) throw new Error(data.error || 'No se pudo reportar');
        await patchPedido(pedidoDetalle.id, { arreglo: faltante, estado: 'calidad' });
        toast('Arreglo reportado');
        cerrarDetalle();
        cargar();
      } catch (e) {
        toast('Error: ' + e.message, 'error');
      }
    }
    cargar();
    setInterval(cargar, 7000);
  </script>
</body>
</html>
